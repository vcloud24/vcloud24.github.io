<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MY FITNESS</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="ILOGOT.jpeg" type="image/jpeg">
</head>
<body class="cool-theme">
    <div class="container">
        <header class="header">
            <h1>MY FITNESS</h1>
            <h2>By Vilakazi Vuyani</h2>
        </header>
        
        <section class="timer-section">
            <h3>Countdown to the End of the Challenge</h3>
            <div id="countdown" class="cool-background">00d 00h 00m 00s</div>
        </section>

        <section class="speech-section">
            <div id="speech-box" class="cool-background"></div>
        </section>

        <section class="gallery">
            <h3>My Fitness Journey</h3>
            <div class="image-grid" id="image-grid"></div>
        </section>

        <section class="calendar-section">
            <h3>Calendar</h3>
            <div id="calendar" class="cool-background"></div>
        </section>

        <footer class="footer">
            <p id="redirect-msg" class="cool-background"></p>
        </footer>
    </div>
</body>
</html>
