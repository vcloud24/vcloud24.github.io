<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilakazi Games</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slide" id="slide1">
        <h1 id="welcomeText">Welcome / Bienvenue / Siyakwamukela</h1>
    </div>

    <div class="slide" id="slide2">
        <h2>Choose Your Language:</h2>
        <button onclick="chooseLanguage('en')">English</button>
        <button onclick="chooseLanguage('fr')">French</button>
        <button onclick="chooseLanguage('zu')">Zulu</button>
    </div>

    <div class="slide" id="slide3">
        <p id="appsText">This website was made using:</p>
        <ul>
            <li>GitHub</li>
            <li>ChatGPT (for translation)</li>
            <li>Notepad++</li>
        </ul>
    </div>

    <div class="slide" id="slide4">
        <p id="userInfo">Date: <span id="date"></span><br>
        Time: <span id="time"></span><br>
        Country: <span id="country"></span><br>
        IP Address: <span id="ip"></span></p>
    </div>

    <div class="slide" id="slide5">
        <h1 id="logoText">VGAMES</h1>
        <div id="gameLinks">
            <a href="vcloud24.github.io/ludo.html">Ludo</a>
            <a href="vcloud24.github.io/TIC-TAC-TOE.html">Tic Tac Toe</a>
            <a href="vcloud24.github.io/game3.html">Game 3</a>
            <a href="vcloud24.github.io/game4.html">Game 4</a>
        </div>
        <div id="loopMessage">Loop</div>
        <span id="slide5Time"></span>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
