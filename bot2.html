<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Assistance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 20px;
            animation: backgroundAnimation 10s ease-in-out infinite;
            overflow-x: hidden;
        }

        @keyframes backgroundAnimation {
            0% { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
            50% { background: linear-gradient(135deg, #ff6a00, #ffcc00); }
            100% { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input, button {
            width: calc(100% - 40px);
            margin: 10px 20px;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: #ff7e5f;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #feb47b;
        }

        .hidden {
            display: none;
        }

        #error-msg {
            color: #ff4d4d;
        }

        .status-box {
            margin: 20px 0;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .online {
            background-color: #28a745;
            color: white;
        }

        .offline {
            background-color: #dc3545;
            color: white;
        }

        /* Floating Widget */
        .widget-popup {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 15px;
            z-index: 1000;
            width: 300px;
            display: none; /* Initially hidden */
        }

        .widget-popup.visible {
            display: block;
        }

        .close-widget {
            background-color: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            top: 5px;
            right: 5px;
        }

        .pagination {
            margin-top: 20px;
        }

        .page-button {
            background-color: #ff7e5f;
            color: white;
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .page-button:hover {
            background-color: #feb47b;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Bot Assistance for Website Monitoring</h1>
        <div id="auth-section">
            <input type="password" id="password" placeholder="Enter Password">
            <button id="login-btn">Enter</button>
            <p id="error-msg" class="hidden">Invalid password. Try again.</p>
        </div>

        <div id="dashboard" class="hidden">
            <h2>Website Status</h2>
            <div id="status-list">
                <!-- Website statuses will be displayed here -->
            </div>
            
            <div id="ad-container" class="ad-popup">
                <p>Don't miss out! For more games, visit <a href="https://vuyani1.github.io" target="_blank" style="color: white;">vuyani1.github.io</a> for the latest updates!</p>
            </div>
        </div>
    </div>

    <!-- Floating Widget -->
    <div id="widget-popup" class="widget-popup">
        <button class="close-widget" onclick="closeWidget()">X</button>
        <h2>Bot Assistance</h2>
        <div id="widget-status-list">
            <!-- Statuses and bot info -->
        </div>
    </div>

    <script>
        // Ensure the bot works only when embedded on allowed domains
        const allowedDomains = ['https://vcloud24.github.io'];
        if (!allowedDomains.includes(window.location.origin)) {
            alert("This bot can only be used on specific websites.");
            window.location.href = "about:blank";
        }

        // Initialize password protection and dashboard
        document.getElementById('login-btn').addEventListener('click', checkPassword);
        document.getElementById('password').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });

        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = 'bash26'; // Use stronger encryption if needed

            if (password === correctPassword) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadWebsiteStatuses();
                showWidget();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // Website status loading
        function loadWebsiteStatuses() {
            const statusList = document.getElementById('status-list');
            statusList.innerHTML = '';

            const websites = [
                'vuyani1.github.io',
                'vgames1.github.io',
                'vcloud24.github.io'
            ];

            websites.forEach((website) => {
                const statusBox = document.createElement('div');
                statusBox.className = 'status-box';
                statusBox.innerHTML = `
                    <h4>${website}</h4>
                    <div class="status">Checking...</div>
                `;
                statusList.appendChild(statusBox);

                const statusDiv = statusBox.querySelector('.status');
                
                fetch(`https://${website}`)
                    .then(response => {
                        if (response.ok) {
                            statusDiv.textContent = `${website} is Online`;
                            statusDiv.classList.add('online');
                            statusDiv.classList.remove('offline');
                        } else {
                            throw new Error('Site unreachable');
                        }
                    })
                    .catch(() => {
                        statusDiv.textContent = `${website} is Offline`;
                        statusDiv.classList.add('offline');
                        statusDiv.classList.remove('online');
                    });
            });
        }

        // Show widget as popup
        function showWidget() {
            const widget = document.getElementById('widget-popup');
            widget.classList.add('visible');
        }

        // Close the widget
        function closeWidget() {
            const widget = document.getElementById('widget-popup');
            widget.classList.remove('visible');
        }
    </script>
</body>
</html>
