<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCloud Monitoring & Security</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 20px;
            animation: backgroundAnimation 10s ease-in-out infinite;
        }

        @keyframes backgroundAnimation {
            0% { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
            50% { background: linear-gradient(135deg, #ff6a00, #ffcc00); }
            100% { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input, button {
            width: calc(100% - 40px);
            margin: 10px 20px;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: #ff7e5f;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #feb47b;
        }

        .hidden {
            display: none;
        }

        #error-msg {
            color: #ff4d4d;
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            border-radius: 10px;
            margin: 20px;
            padding: 20px;
            text-align: left;
            display: inline-block;
            width: 100%;
            max-width: 720px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
        }

        .status {
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .online {
            background-color: #28a745;
            color: white;
        }

        .offline {
            background-color: #dc3545;
            color: white;
        }

        .video-url-input {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border-radius: 5px;
        }

        .popup-video {
            position: absolute;
            top: 10px;
            left: 10px;
            background: black;
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VCloud Monitoring & Security</h1>
        <div id="auth-section">
            <input type="password" id="password" placeholder="Enter Password">
            <button id="login-btn">Enter</button>
            <p id="error-msg" class="hidden">Invalid password. Try again.</p>
        </div>
        <div id="dashboard" class="hidden">
            <h2>Website Status</h2>
            <div id="status-list">
                <!-- Website statuses will be displayed here -->
            </div>
            <h2>Push Video</h2>
            <form id="video-form">
                <input type="url" id="video-url" placeholder="Enter Video URL" required>
                <button type="submit">Push Video</button>
            </form>
        </div>
    </div>

    <script>
        const websites = [
            'vuyani1.github.io',
            'vgames1.github.io',
            'vcloud24.github.io'
        ];

        document.getElementById('login-btn').addEventListener('click', checkPassword);
        document.getElementById('password').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });

        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = atob('dnV5dmlsZ2FtMjAwNzIwMjQ='); // Base64 encoded password

            if (password === correctPassword) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadWebsiteStatuses();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function loadWebsiteStatuses() {
            const statusList = document.getElementById('status-list');
            statusList.innerHTML = '';

            websites.forEach(site => {
                const previewBox = document.createElement('div');
                previewBox.className = 'preview-box';
                previewBox.innerHTML = `
                    <h4>${site}</h4>
                    <iframe src="https://${site}" sandbox="allow-scripts"></iframe>
                    <input class="video-url-input" type="url" placeholder="Enter Video URL for ${site}" />
                    <div class="status">Checking...</div>
                `;
                statusList.appendChild(previewBox);

                const statusDiv = previewBox.querySelector('.status');
                const videoUrlInput = previewBox.querySelector('.video-url-input');

                fetch(`https://${site}`)
                    .then(response => {
                        if (response.ok) {
                            statusDiv.textContent = '${site} is Online';
                            statusDiv.classList.add('online');
                            statusDiv.classList.remove('offline');
                        } else {
                            throw new Error('Site unreachable');
                        }
                    })
                    .catch(() => {
                        statusDiv.textContent = '${site} is Offline';
                        statusDiv.classList.add('offline');
                        statusDiv.classList.remove('online');
                    });

                videoUrlInput.addEventListener('input', function() {
                    const videoUrl = videoUrlInput.value;
                    if (videoUrl) {
                        const popup = document.createElement('div');
                        popup.className = 'popup-video';
                        popup.innerHTML = `
                            <p>New Video Available:</p>
                            <a href="${videoUrl}" target="_blank" style="color: #ff7e5f;">Watch Video</a>
                        `;
                        previewBox.appendChild(popup);
                        document.querySelector(`iframe[src*="${site}"]`).src = videoUrl; // Update iframe with new video URL
                    }
                });
            });
        }

        document.getElementById('video-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const videoURL = document.getElementById('video-url').value;

            alert(`Video URL "${videoURL}" pushed to all websites.`);
        });
    </script>
</body>
</html>






<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGAMES Index</title>
    <link rel="icon" href="ILOGOT.jpeg" type="image/jpeg">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, pink, blue);
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .offline-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, red, orange);
            color: white;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 9999;
        }
        .offline-banner h2 {
            margin: 0;
            font-size: 1.5em;
        }
        .offline-banner p {
            margin: 5px 0;
            font-size: 1.2em;
        }
        .close-button {
            background-color: white;
            color: red;
            border: none;
            padding: 5px 15px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .close-button:hover {
            background-color: lightcoral;
            color: white;
        }
    </style>
</head>
<body>
    <div id="offline-banner" class="offline-banner">
        <h2>You're Offline!</h2>
        <p>Turn on Data or Wi-Fi to continue.</p>
        <p>If the problem persists, contact <a href="mailto:vuyaniphila86@gmail.com" style="color: yellow;">vuyaniphila86@gmail.com</a>.</p>
        <button class="close-button" onclick="hideOfflineBanner()">Close</button>
    </div>

    <script>
        // Function to check online/offline status
        function checkConnection() {
            const offlineBanner = document.getElementById('offline-banner');
            if (navigator.onLine) {
                offlineBanner.style.display = 'none';
            } else {
                offlineBanner.style.display = 'block';
            }
        }

        // Function to hide the offline banner
        function hideOfflineBanner() {
            document.getElementById('offline-banner').style.display = 'none';
        }

        // Check connection on load and listen for status changes
        window.onload = checkConnection;
        window.addEventListener('online', checkConnection);
        window.addEventListener('offline', checkConnection);
    </script>
</body>
</html>
