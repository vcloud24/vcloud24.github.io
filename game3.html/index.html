<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGAMES Trivia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="score" id="scoreBox">Score: <span id="score">0</span></div>
    <div class="time" id="timeBox">Time: <span id="time">30</span>s</div>
    <div class="strike" id="strikeBox">Strikes: <span id="strikes">0</span>/3</div>

    <div class="question-container">
        <p id="questionText">Loading question...</p>
        <div class="options">
            <button onclick="answerQuestion(1)">Option 1</button>
            <button onclick="answerQuestion(2)">Option 2</button>
            <button onclick="answerQuestion(3)">Option 3</button>
            <button onclick="answerQuestion(4)">Option 4</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <p id="popupText">You scored <span id="finalScore">0</span>! Share your success with friends!</p>
            <button onclick="shareScore()">Share with Friends</button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
